<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculadora simple hecha en js">
  <meta name="theme-color" content="#3498db">
  <meta name="twitter:card" content="summary">
  <meta property="og:title" name="twitter:title" content="Calculadora">
  <meta property="og:image" name="twitter:image"
    content="https://Axe10rellana.github.io/calculadora/calculadora/assets/hero-image-home.jpg">
  <meta property="og:url" name="twitter:url" content="https://Axe10rellana.github.io/calculadora/calculadora">
  <meta property="og:description" name="twitter:description" content="Calculadora simple hecha en js">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="assets/favicon.png">
  <link rel="canonical" href="https://Axe10rellana.github.io/calculadora/calculadora">
  <link rel="favicon" href="https://Axe10rellana.github.io/calculadora/calculadora/assets/favicon.png">
  <link rel="apple-touch-icon" href="https://Axe10rellana.github.io/calculadora/calculadora/assets/favicon.png">
  <script src="https://kit.fontawesome.com/a74e3c1ac7.js" crossorigin="anonymous"></script>
  <title>Calculadora</title>
</head>

<body>
  <section>
    <div class="container">
      <div class="display">
        <div class="display-1">0</div>
        <div class="display-2">0</div>
        <div class="temp-result">0</div>
      </div>
      <div class="all-buttons">
        <div class="button all-clear">C</div>
        <div class="button last-entity-clear">CE</div>
        <div class="button operation">%</div>
        <div class="button operation">/</div>
        <div class="button number">7</div>
        <div class="button number">8</div>
        <div class="button number">9</div>
        <div class="button operation">X</div>
        <div class="button number">4</div>
        <div class="button number">5</div>
        <div class="button number">6</div>
        <div class="button operation">-</div>
        <div class="button number">1</div>
        <div class="button number">2</div>
        <div class="button number">3</div>
        <div class="button operation">+</div>
        <div class="button number btn-0">0</div>
        <div class="button number dot">.</div>
        <div class="button equal">=</div>
      </div>
    </div>
  </section>
  <script src="js/app.js"></script>
</body>

</html>
